version: '3.8'

services:
  backend:
    build: ./backend
    container_name: nursing-schedule-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./backend/data:/app/data

  frontend:
    build: ./frontend
    container_name: nursing-schedule-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
